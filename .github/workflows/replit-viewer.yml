name: Replit Viewer

on:
  push:
    branches:
      - replit-viewer
  workflow_dispatch:

jobs:
  validate-viewer:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install viewer dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Validate dashboard files
        run: |
          test -f dashboard_data/summary.json
          test -f dashboard_data/morning_report.csv
          test -f dashboard_data/symbol_metrics.csv
          test -f dashboard_data/symbol_timeseries.csv
          test -f dashboard_data/trade_log.csv
          test -f dashboard_data/aggregate_timeseries.csv
          python -m py_compile app.py dashboard.py
